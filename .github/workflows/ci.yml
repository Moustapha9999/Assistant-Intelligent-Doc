name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:  # lancement manuel depuis l'onglet Actions

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (erreurs critiques)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Installer flake8
        run: python -m pip install --upgrade pip flake8
      - name: Vérifier syntaxe / noms non définis
        run: |
          flake8 src tests \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lancer pytest
        env:
          PYTHONPATH: src
        run: pytest tests/ -q --tb=short
      - name: Résumé
        if: always()
        run: |
          {
            echo "## CI AssistDoc"
            echo "- Lint : job précédent"
            echo "- Tests : \`pytest tests/\` (Python 3.11)"
            echo "- Relancer localement : \`pwsh scripts/run_ci.ps1\`"
          } >> "$GITHUB_STEP_SUMMARY"
