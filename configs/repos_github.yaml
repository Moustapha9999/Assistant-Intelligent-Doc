criteres_selection:
  min_stars: 500
  max_repos_par_langage: 10
  langages:
    - Python
    - JavaScript
    - TypeScript
    - Java
    - Go
    - Rust
    - C
    - C++
    - SQL
  max_age_mois: 24
  doit_avoir_readme: true
  exclure_forks: true
  exclure_archives: true

extensions_a_collecter:
  priorite_haute:
    - .py
    - .ipynb
    - .sql
    - .js
    - .ts
    - .java
    - .go
    - .rs
    - .cpp
    - .c
    - .h
  priorite_moyenne:
    - .md
    - .rst
    - .yaml
    - .yml
    - .json
    - .toml
  a_exclure:
    - node_modules
    - dist
    - build
    - target
    - .git

